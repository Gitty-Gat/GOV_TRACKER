name: Refresh Civic Ledger Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
      FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_PATH: data/civic_ledger.db
      CURRENT_CONGRESS: "119"
      DEFAULT_CYCLE: "2026"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed baseline snapshots
        run: python scripts/bootstrap_precomputed_data.py

      - name: Refresh live read model
        run: python scripts/refresh_read_model.py --refresh-promises
